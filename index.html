<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-label">VOICE TERMINAL // ONLINE</div>
      <div class="brand-name"><span class="dot"></span>MY ASSISTANT</div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Timer</div>
      <div class="timer-box">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-controls">
          <button class="mini-btn" data-adjust="60">+1m</button>
          <button class="mini-btn" data-adjust="300">+5m</button>
          <button class="mini-btn" id="timerToggle">Start</button>
          <button class="mini-btn" data-action="reset-timer">Reset</button>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Reminders <span id="remCount"></span></div>
      <ul class="task-list" id="reminderList"></ul>
    </div>

    <div class="sidebar-section grow">
      <div class="section-title">Notes <span id="noteCount"></span></div>
      <ul class="task-list" id="noteList"></ul>

      <div class="mascot-panel">
        <div class="mascot-speech" id="mascotSpeech" aria-live="polite"></div>
        <button class="mascot" id="mascotBtn" type="button" aria-label="Mascot character">
          <span class="mascot-shadow"></span>
          <span class="mascot-body">
            <span class="mascot-hair"></span>
            <span class="mascot-head">
              <span class="mascot-eye left"></span>
              <span class="mascot-eye right"></span>
              <span class="mascot-mouth"></span>
            </span>
            <span class="mascot-neck"></span>
            <span class="mascot-torso"></span>
            <span class="mascot-arm left"></span>
            <span class="mascot-arm right"></span>
            <span class="mascot-leg left"></span>
            <span class="mascot-leg right"></span>
            <span class="mascot-suit-badge"></span>
          </span>
        </button>
        <div class="mascot-caption">DON'T Tap the mascot</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">Conversation Log</div>
      </div>
      <button class="clear-btn">Clear</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="intro" id="intro">
        <div class="intro-orb"></div>
        <h2>I'm awake. Try not to waste it.</h2>
        <p>Type or talk to me. I can chat, set reminders, jot notes, and run a timer — all while judging your life choices, gently.</p>
      </div>
    </div>

    <div class="status-line" id="statusLine"></div>

    <div class="input-bar">
      <button class="speech-toggle-btn" id="speechToggleBtn" type="button">Allow Auto Speech</button>
      <button class="mic-btn" id="micBtn" title="Talk to me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <div class="input-wrap">
        <textarea id="textInput" rows="1" placeholder="Say something… I dare you."></textarea>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script src="responses.js"></script>
<script src="script.js"></script>

</body>
</html>
